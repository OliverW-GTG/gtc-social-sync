<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Label untagged posts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--navy:#17213D;--blue:#2F6DB9;--gold:#C9A24B;--cream:#F6F7ED;--muted:#6B7385;--line:#E3E1D4;--card:#fff;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--cream);color:var(--navy);font-family:'Lato',system-ui,sans-serif;}
  h1{font-family:'Poppins';font-size:20px;font-weight:600;margin:0;}
  .wrap{max-width:820px;margin:0 auto;padding:22px 18px 60px;}
  .top{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
  .top a{font-family:'Poppins';font-weight:600;font-size:13px;color:var(--blue);text-decoration:none;}
  .sub{color:var(--muted);font-size:13px;margin-top:4px;}
  .pwbar{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .pwbar label{font-family:'Poppins';font-weight:600;font-size:12px;}
  input,select{font-family:'Lato';font-size:13px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--navy);}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;}
  .card .meta{font-family:'Poppins';font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .chip{font-size:10px;font-weight:600;padding:1px 6px;border-radius:5px;}
  .p-ig{background:#FCE4EC;color:#AD1457;}.p-fb{background:#E3F2FD;color:#1565C0;}
  .card .meta a{color:var(--blue);text-decoration:none;}
  .card .caption{font-size:14px;line-height:1.5;margin-bottom:12px;white-space:pre-wrap;}
  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .newbox{display:flex;gap:8px;flex-wrap:wrap;align-items:center;width:100%;margin-top:8px;padding:10px;background:var(--cream);border-radius:8px;}
  .newbox label{font-size:12px;display:flex;gap:5px;align-items:center;}
  button{font-family:'Poppins';font-weight:600;font-size:13px;border:0;border-radius:8px;padding:9px 14px;cursor:pointer;}
  .save{background:var(--navy);color:#fff;}
  .skip{background:transparent;color:var(--muted);border:1px solid var(--line);}
  .status{font-family:'Poppins';font-size:12px;}
  .ok{color:#2E7D4F;}.err{color:#B23A3A;}
  .state{padding:40px;text-align:center;color:var(--muted);font-family:'Poppins';}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <h1>Label untagged posts</h1>
      <div class="sub" id="sub">Loading...</div>
    </div>
    <a href="/">&larr; Back to dashboard</a>
  </div>

  <div class="pwbar">
    <label for="pw">Your sync password</label>
    <input type="password" id="pw" placeholder="the SYNC_SECRET you set" style="flex:1;min-width:180px;">
    <span class="sub" style="margin:0;">Needed to save changes</span>
  </div>

  <div id="list"></div>
  <div id="loading" class="state">Loading untagged posts...</div>
  <div id="more" style="text-align:center;display:none;"><button class="skip" id="reload">Refresh list</button></div>
</div>

<script>
let RESORTS=[], COUNTRIES=[], RESORT_COUNTRY={};
const $=(s,el=document)=>el.querySelector(s);
const pw=()=>$('#pw').value.trim();

async function load(){
  $('#loading').style.display='block';
  $('#list').innerHTML='';
  try{
    const res=await fetch('/api/label');
    const d=await res.json();
    if(!res.ok) throw new Error(d.error||res.status);
    RESORTS=d.resorts; COUNTRIES=d.countries;
    RESORT_COUNTRY={}; RESORTS.forEach(r=>RESORT_COUNTRY[r.name]=r.country);
    $('#sub').textContent = d.remaining+' posts still need a destination (showing up to 300). General posts with no destination can be marked so they stop appearing.';
    render(d.untagged);
    $('#loading').style.display='none';
    $('#more').style.display = d.untagged.length ? 'block':'none';
    if(!d.untagged.length) $('#list').innerHTML='<div class="state">Nothing left to label. Nice work.</div>';
  }catch(err){
    $('#loading').textContent='Could not load: '+err.message;
  }
}

function resortOptions(){
  return '<option value="">Choose a destination...</option>'
    + RESORTS.map(r=>`<option value="${esc(r.name)}">${esc(r.name)} (${esc(r.country)})</option>`).join('')
    + '<option value="__new__">+ Add a new resort</option>';
}
function countryOptions(){
  return '<option value="">Country...</option>'+COUNTRIES.map(c=>`<option value="${esc(c.country)}">${esc(c.country)} (${c.region})</option>`).join('');
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(posts){
  const list=$('#list');
  list.innerHTML='';
  posts.forEach(p=>{
    const chip = p.platform==='Instagram'?'<span class="chip p-ig">Instagram</span>':'<span class="chip p-fb">Facebook</span>';
    const date = new Date(p.posted_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
    const link = p.permalink?`<a href="${esc(p.permalink)}" target="_blank" rel="noopener">view post</a>`:'';
    const card=document.createElement('div');
    card.className='card'; card.dataset.id=p.id;
    card.innerHTML=`
      <div class="meta">${chip}<span>${date}</span>${link}</div>
      <div class="caption">${esc(p.caption)||'<em style="color:var(--muted)">No caption text</em>'}</div>
      <div class="controls">
        <select class="resort-pick">${resortOptions()}</select>
        <button class="save">Save</button>
        <button class="skip">Not a destination</button>
        <span class="status"></span>
      </div>
      <div class="newbox" style="display:none;">
        <input class="new-name" placeholder="New resort name, e.g. Fota Island" style="flex:1;min-width:160px;">
        <select class="new-country">${countryOptions()}</select>
        <label><input type="checkbox" class="remember" checked> Remember for future posts</label>
      </div>`;
    list.appendChild(card);
  });
}

document.addEventListener('change',e=>{
  if(e.target.classList.contains('resort-pick')){
    const card=e.target.closest('.card');
    card.querySelector('.newbox').style.display = e.target.value==='__new__' ? 'flex':'none';
  }
});

document.addEventListener('click',async e=>{
  const card=e.target.closest('.card'); if(!card) return;
  const id=card.dataset.id;
  const status=card.querySelector('.status');

  if(e.target.classList.contains('skip')){
    await send(card, { id, action:'skip' }, 'Marked as general');
    return;
  }
  if(e.target.classList.contains('save')){
    const pick=card.querySelector('.resort-pick').value;
    let resort, country, addToLookup=false;
    if(pick==='__new__'){
      resort=card.querySelector('.new-name').value.trim();
      country=card.querySelector('.new-country').value;
      addToLookup=card.querySelector('.remember').checked;
      if(!resort||!country){ status.textContent='Enter a name and country'; status.className='status err'; return; }
    }else if(pick){
      resort=pick; country=RESORT_COUNTRY[pick];
    }else{
      status.textContent='Pick a destination first'; status.className='status err'; return;
    }
    await send(card, { id, resort, country, addToLookup }, 'Saved');
  }
});

async function send(card, payload, okMsg){
  const status=card.querySelector('.status');
  if(!pw()){ status.textContent='Enter your password at the top'; status.className='status err'; return; }
  status.textContent='Saving...'; status.className='status';
  try{
    const res=await fetch('/api/label',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...payload, token:pw()})});
    const d=await res.json();
    if(!res.ok) throw new Error(d.error||res.status);
    status.textContent=okMsg; status.className='status ok';
    card.style.transition='opacity .4s'; card.style.opacity='.4';
    setTimeout(()=>card.remove(),450);
  }catch(err){
    status.textContent=err.message; status.className='status err';
  }
}

$('#reload').addEventListener('click',load);
load();
</script>
</body>
</html>
